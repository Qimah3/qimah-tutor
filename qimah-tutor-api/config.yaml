llm:
  provider: openai
  model: gpt-4o-mini
  temperature: 0.7
  max_tokens: 4000
  timeout: 30

embedding:
  model: default

rag:
  initial_candidates: 15
  final_top_k: 5
  ocr_confidence_min: 60
  ocr_text_length_min: 100
  weak_threshold: 1.3
  min_grounding_chunks: 3
  source_weights:
    old_exam: 1.5
    lecture_note: 1.2
    handout: 1.0
    screenshot: 0.8

generation:
  max_retries: 2
  quiz_count: 5
  flashcard_count: 10
  difficulty: mixed
  language: arabic

security:
  hmac_timestamp_window_seconds: 60
  per_user_rate_limit: 20
  max_body_size_kb: 10

indexer:
  chunk_size: 500
  overlap: 50
  scanned_pdf_threshold: 50
  index_interval_hours: 6
